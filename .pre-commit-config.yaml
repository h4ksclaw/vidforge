repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: no-commit-to-branch
        args: [--branch, main]
        stages: [push]

  - repo: local
    hooks:
      - id: no-scoped-imports
        name: No scoped imports (must be at top of file)
        entry: scripts/check-no-scoped-imports.sh
        language: script
        pass_filenames: false

      - id: no-relative-imports
        name: No relative imports in src/
        entry: bash -c 'if grep -rn "from \.\." src/ --include="*.py" | grep -v "^[^:]*:[[:space:]]*#"; then echo "❌ Found relative imports — use absolute imports (from vidforge.xxx)"; exit 1; fi'
        language: system
        pass_filenames: false

      - id: pytest-coverage
        name: Run tests with coverage (>=80%)
        entry: uv run pytest --cov --cov-fail-under=80 -q
        language: system
        pass_filenames: false
        stages: [push]

      - id: mypy
        name: Run mypy type checking
        entry: uv run mypy src/
        language: system
        pass_filenames: false
        stages: [push]
