name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Generate Videos"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'push'
      || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install deps
        run: uv sync --extra dev --extra music

      - name: Install graphviz
        run: sudo apt-get update -qq && sudo apt-get install -y -qq graphviz

      - name: Download output artifact (from Generate Videos)
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ github.event.workflow_run.id }} \
            --repo ${{ github.repository }} \
            -n output \
            -D site-output || true

      - name: Create output dir (push trigger)
        if: github.event_name == 'push'
        run: mkdir -p site-output

      - name: Generate DAG SVGs for all generators
        run: |
          mkdir -p site-output/dags
          uv run vidforge dag --generator heights --output site-output/dags/heights.svg

      - name: Build pages site
        run: python3 scripts/build_pages.py site-output site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
