name: Generate Videos

on:
  schedule:
    # Weekly Monday noon UTC
    - cron: "0 12 * * 1"
  workflow_dispatch:
    inputs:
      recipe:
        description: "Recipe file path"
        required: false
        default: "config/recipes/anime_heights_dbz.yaml"
      skip_bg_removal:
        description: "Skip background removal (faster, no rembg)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Cache vidgen assets
        uses: actions/cache@v4
        with:
          path: ~/.cache/vidgen
          key: vidgen-${{ hashFiles('config/characters/*.yaml') }}
          restore-keys: |
            vidgen-

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y graphviz ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install deps
        run: uv sync --extra dev --extra music

      - name: Lint + test
        run: uv run ruff check src/ tests/ && uv run pytest --cov -q

      - name: Generate video
        run: |
          RECIPE="${{ github.event.inputs.recipe || 'config/recipes/anime_heights_dbz.yaml' }}"
          SKIP_BG="${{ github.event.inputs.skip_bg_removal || 'false' }}"
          uv run vidforge generate "$RECIPE" --export-dag output/dag.html

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: output
          path: output/
          retention-days: 7
          if-no-files-found: ignore
