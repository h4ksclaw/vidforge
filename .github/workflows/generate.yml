name: Generate Videos

on:
  schedule:
    # Weekly Monday noon UTC
    - cron: "0 12 * * 1"
  workflow_dispatch:
    inputs:
      recipe:
        description: "Recipe file path"
        required: false
        default: "config/recipes/anime_heights_dbz.yaml"
      target:
        description: "Platform target"
        required: false
        default: "youtube"

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Cache assets
        uses: actions/cache@v4
        with:
          path: ~/.cache/vidgen
          key: vidgen-${{ hashFiles('config/characters/*.yaml') }}
          restore-keys: |
            vidgen-

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y graphviz ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install deps
        run: uv sync --extra dev --extra music

      - name: Lint + test
        run: uv run ruff check src/ tests/ && uv run pytest --cov -q

      - name: Test Fandom API access
        run: |
          uv run python -c "
          import urllib.request, json
          HEADERS = {'User-Agent': 'VidForge/0.1 (github.com/h4ksclaw/vidforge)'}
          url = 'https://dragonball.fandom.com/api.php?action=query&titles=Krillin&prop=info&format=json'
          req = urllib.request.Request(url, headers=HEADERS)
          resp = urllib.request.urlopen(req, timeout=15)
          data = json.loads(resp.read())
          page_id = list(data['query']['pages'].keys())[0]
          if page_id != '-1':
              print('✅ Fandom API accessible from GitHub Actions')
          else:
              print('❌ Fandom API blocked')
              exit(1)
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: output
          path: output/
          retention-days: 7
          if-no-files-found: ignore
